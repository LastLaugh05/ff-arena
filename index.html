<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>FF ARENA - Esports Tournaments</title>
    <meta name="description" content="Join daily Free Fire tournaments and win prizes!">
    
    <link rel="icon" type="image/png" href="favicon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="FF ARENA India">
    <meta property="og:description" content="Join daily Free Fire tournaments and win prizes!">
    <meta property="og:image" content="https://your-netlify-link.netlify.app/preview.jpg">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h1 class="loader-logo">FF ARENA</h1>
            <div class="loader-bar"></div>
        </div>
    </div>

    <div class="circle"></div>
    <div class="circle"></div>

    <div class="wrapper single-panel" id="main-wrapper">
        
        <div class="form-box" id="login-box">
            <h2>FF ARENA</h2>
            <button id="google-login-btn" class="google-btn">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="G">
                CONTINUE WITH GOOGLE
            </button>
        </div>

        <div class="form-box hidden" id="username-box">
            <h2>Almost Done!</h2>
            <p class="sub-text">Choose a unique app username for FF Arena.</p>
            <form id="username-form" autocomplete="off">
                <div class="input-group">
                    <label>App Username</label>
                    <input type="text" id="app-username" required autocomplete="off">
                </div>
                <button type="submit" class="cyan-glow-btn">ENTER ARENA</button>
            </form>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
